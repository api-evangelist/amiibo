apis:
  - aid: amiibo:amiibo-api
    name: Amiibo API
    description: >-
      A RESTful API that provides detailed information about Nintendo Amiibo
      figures, including character data, game series, amiibo series, type
      classifications, regional release dates (NA, EU, JP, AU), and compatible
      game lists for 3DS, Wii U, and Nintendo Switch. Supports filtering by
      name, character, gameSeries, amiiboSeries, type, and hexadecimal head/tail
      identifiers. No API key or authentication required.
    humanURL: https://amiiboapi.org/
